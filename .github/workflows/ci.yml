name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/unused

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ai-reliability-fw from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pip install "https://${GITHUB_TOKEN}@github.com/ngallodev-software/ai-reliability-fw/releases/download/v0.2.0/ai_reliability_fw-0.2.0-py3-none-any.whl"

      - name: Install eval-lab
        run: pip install -e .

      - name: Quickstart smoke test (no DB, no API key)
        run: python3 -m examples.run_eval

      - name: Dry-run evaluation
        run: python3 -m evaluation.runner --dataset datasets/ --name ci-test --dry-run
