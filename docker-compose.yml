services:
  db:
    image: postgres:15
    container_name: eval_lab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Run with: docker compose --profile migrate up migrate
  # Applies security-ai-eval-lab migrations (security_eval schema).
  # NOTE: ai-reliability-fw migrations (reliability schema) must be run
  # separately from the ai-reliability-fw project before running this.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AI_RELIABILITY_FW_VERSION: ${AI_RELIABILITY_FW_VERSION:-0.2.1}
        AI_RELIABILITY_FW_WHEEL_URL: ${AI_RELIABILITY_FW_WHEEL_URL:-}
        AI_RELIABILITY_FW_WHEEL_SHA256: ${AI_RELIABILITY_FW_WHEEL_SHA256:-}
      secrets:
        - registry_token
    container_name: eval_lab_migrate
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: alembic upgrade head
    profiles:
      - migrate

  eval-lab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AI_RELIABILITY_FW_VERSION: ${AI_RELIABILITY_FW_VERSION:-0.2.1}
        AI_RELIABILITY_FW_WHEEL_URL: ${AI_RELIABILITY_FW_WHEEL_URL:-}
        AI_RELIABILITY_FW_WHEEL_SHA256: ${AI_RELIABILITY_FW_WHEEL_SHA256:-}
      secrets:
        - registry_token
    container_name: eval_lab_runner
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./datasets:/app/datasets:ro
      - ./outputs:/app/outputs

volumes:
  postgres_data:

secrets:
  registry_token:
    environment: REGISTRY_TOKEN
